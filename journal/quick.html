<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Emily Quick</title>
<link rel="manifest" href="widget-manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1419;--card:#1a2332;--border:#2a3a4e;--text:#e8ecf1;--dim:#7a8da0;--muted:#4a5b6e;--accent:#f59e0b;--accent-s:rgba(245,158,11,0.12);--r:16px;--safe:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:16px;padding-bottom:calc(16px + var(--safe))}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.header h1{font-family:'Lora',serif;font-size:20px;font-weight:700}
.header a{color:var(--accent);font-size:12px;font-weight:600;text-decoration:none}

/* Streak */
.streak-row{display:flex;gap:10px;margin-bottom:14px}
.streak-box{flex:1;background:var(--card);border-radius:var(--r);padding:12px;text-align:center;border:1px solid var(--border)}
.streak-box .sv{font-family:'Lora',serif;font-size:24px;font-weight:700}
.streak-box .sl{font-size:10px;color:var(--dim);margin-top:2px}

/* Mood */
.mood-card{background:var(--card);border-radius:var(--r);padding:14px;border:1px solid var(--border);margin-bottom:14px}
.mood-card h3{font-size:12px;font-weight:600;color:var(--dim);margin-bottom:10px}
.mood-row{display:flex;gap:6px}
.mood-btn{flex:1;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--bg);border:2px solid var(--border);border-radius:14px;cursor:pointer;transition:all .15s}
.mood-btn:active,.mood-btn.done{transform:scale(1.1);border-color:var(--accent);background:var(--accent-s)}

/* Quick Write */
.quick-write{background:var(--card);border-radius:var(--r);padding:14px;border:1px solid var(--border);margin-bottom:14px}
.quick-write h3{font-size:12px;font-weight:600;color:var(--dim);margin-bottom:8px}
.qw-row{display:flex;gap:8px}
.qw-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none}
.qw-input:focus{border-color:var(--accent)}
.qw-input::placeholder{color:var(--muted)}
.qw-send{width:44px;height:44px;border-radius:12px;background:var(--accent);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.qw-send:active{transform:scale(0.92)}
.qw-send:disabled{opacity:.4}

/* Quick Links */
.links{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.link-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 4px;text-align:center;text-decoration:none;transition:all .15s;cursor:pointer}
.link-btn:active{transform:scale(0.95);border-color:var(--accent)}
.link-btn .le{font-size:22px;display:block;margin-bottom:4px}
.link-btn .lt{font-size:9px;color:var(--dim);font-weight:600}

/* Today's prompt */
.prompt{background:linear-gradient(135deg,#2a1f0f,#1a1508);border:1px solid #3d2f14;border-radius:var(--r);padding:14px;margin-bottom:14px;cursor:pointer;transition:transform .15s}
.prompt:active{transform:scale(0.98)}
.prompt .pl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin-bottom:4px}
.prompt .pt{font-family:'Lora',serif;font-size:14px;font-weight:600;line-height:1.4}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:500;z-index:100;opacity:0;transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Login */
.login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;gap:12px}
.login.active{display:flex}
.login h2{font-family:'Lora',serif;font-size:22px}
.login p{color:var(--dim);font-size:13px}
.login input{width:100%;max-width:280px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none}
.login button{width:100%;max-width:280px;background:var(--accent);color:#000;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.app{display:none}
.app.active{display:block}
</style>
</head>
<body>

<div class="login" id="loginView">
  <div style="font-size:48px">⚡</div>
  <h2>Emily Quick</h2>
  <p>Fast access to your journal</p>
  <input type="password" id="wToken" placeholder="Paste your token">
  <input type="url" id="wApi" placeholder="API URL">
  <button onclick="wLogin()">Connect</button>
</div>

<div class="app" id="appView">
  <div class="header">
    <h1>⚡ Quick Journal</h1>
    <a href="index.html">Open Full App →</a>
  </div>

  <div class="streak-row">
    <div class="streak-box"><div class="sv" id="wStreak">-</div><div class="sl">🔥 Streak</div></div>
    <div class="streak-box"><div class="sv" id="wMood">-</div><div class="sl">📈 Avg Mood</div></div>
    <div class="streak-box"><div class="sv" id="wEntries">-</div><div class="sl">📝 Entries</div></div>
  </div>

  <div class="prompt" id="wPrompt" onclick="usePrompt()">
    <div class="pl">Today's Prompt</div>
    <div class="pt" id="wPromptText">...</div>
  </div>

  <div class="mood-card">
    <h3>Quick Mood Check-in</h3>
    <div class="mood-row">
      <button class="mood-btn" onclick="wMoodLog(1)">😢</button>
      <button class="mood-btn" onclick="wMoodLog(2)">😔</button>
      <button class="mood-btn" onclick="wMoodLog(3)">😐</button>
      <button class="mood-btn" onclick="wMoodLog(4)">😊</button>
      <button class="mood-btn" onclick="wMoodLog(5)">🤩</button>
    </div>
  </div>

  <div class="quick-write">
    <h3>Quick Entry</h3>
    <div class="qw-row">
      <input class="qw-input" id="wEntry" placeholder="What's on your mind...">
      <button class="qw-send" id="wSendBtn" onclick="wSend()">📓</button>
    </div>
  </div>

  <div class="links">
    <a class="link-btn" href="index.html"><span class="le">📖</span><span class="lt">Diary</span></a>
    <a class="link-btn" href="index.html"><span class="le">📊</span><span class="lt">Mood</span></a>
    <a class="link-btn" href="index.html"><span class="le">📝</span><span class="lt">Notes</span></a>
    <a class="link-btn" href="index.html"><span class="le">🙏</span><span class="lt">Gratitude</span></a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PROMPTS=["What moment today made you smile?","What's one thing you're proud of this week?","If today had a title, what would it be?","What are you looking forward to?","What's a lesson life taught you recently?","Who made a positive impact on your life?","What are three things that make your life beautiful?","How did you take care of yourself today?","What challenge are you facing, and what's one small step forward?","What does your ideal tomorrow look like?","Describe your current mood in three words.","What would you do today if you had no fear?","What's something small that brought you joy today?","What's weighing on your mind? Write it out.","What are you currently working towards?","What did God teach you today?","What are you holding onto that you need to release?","How have you grown in the last month?","What's a prayer on your heart?","Who do you need to forgive?","What's the best advice you've ever received?"];

let T=localStorage.getItem('ej_token')||'';
let A=localStorage.getItem('ej_api')||'';

async function api(m,p,b=null){
  const o={method:m,headers:{'Content-Type':'application/json','Authorization':`Bearer ${T}`}};
  if(b)o.body=JSON.stringify(b);
  const r=await fetch(`${A}${p}`,o);
  if(r.status===401)throw new Error('Auth');
  return r.json();
}

function wLogin(){
  const t=document.getElementById('wToken').value.trim();
  const a=document.getElementById('wApi').value.trim();
  if(!t||!a)return;
  T=t;A=a;
  localStorage.setItem('ej_token',T);
  localStorage.setItem('ej_api',A);
  init();
}

async function init(){
  if(!T||!A){document.getElementById('loginView').classList.add('active');return}
  document.getElementById('loginView').classList.remove('active');
  document.getElementById('appView').classList.add('active');

  // Prompt
  const d=new Date();
  const doy=Math.floor((d-new Date(d.getFullYear(),0,0))/(864e5));
  document.getElementById('wPromptText').textContent=PROMPTS[doy%PROMPTS.length];

  // Prefill API URL
  document.getElementById('wApi').value=A;

  // Stats
  try{
    const s=(await api('GET','/api/journal/stats?days=30')).stats||{};
    document.getElementById('wStreak').textContent=s.streak||0;
    document.getElementById('wMood').textContent=s.avg_mood||'-';
    document.getElementById('wEntries').textContent=s.total_entries||0;
  }catch(e){console.error(e)}
}

async function wMoodLog(s){
  const btns=document.querySelectorAll('.mood-btn');
  btns.forEach(b=>b.classList.remove('done'));
  btns[s-1].classList.add('done');
  try{await api('POST','/api/journal/quick-mood',{mood_score:s});toast(['😢','😔','😐','😊','🤩'][s-1]+' Logged!')}catch(e){toast('Failed')}
}

async function wSend(){
  const el=document.getElementById('wEntry');
  const text=el.value.trim();
  if(!text){toast('Write something first');return}
  const btn=document.getElementById('wSendBtn');
  btn.disabled=true;
  try{
    await api('POST','/api/journal/entry',{text});
    toast('📓 Saved!');
    el.value='';
    // Refresh stats
    const s=(await api('GET','/api/journal/stats?days=30')).stats||{};
    document.getElementById('wStreak').textContent=s.streak||0;
    document.getElementById('wEntries').textContent=s.total_entries||0;
  }catch(e){toast('Failed')}
  btn.disabled=false;
}

function usePrompt(){
  const p=document.getElementById('wPromptText').textContent;
  document.getElementById('wEntry').value=p+' ';
  document.getElementById('wEntry').focus();
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// Enter key to send
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement?.id==='wEntry')wSend()});

init();
</script>
</body>
</html>
